<!DOCTYPE html>
<html>
<head>
    <title>Sentient AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: #0f1117;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            background: #161b22;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid #222;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 14px;
            position: relative;
        }

        .user {
            align-self: flex-end;
            background: #2563eb;
        }

        .bot {
            align-self: flex-start;
            background: #1f2937;
        }

        .timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 5px;
        }

        .input-container {
            display: flex;
            padding: 15px;
            background: #161b22;
            border-top: 1px solid #222;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #0f1117;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #1d4ed8;
        }

        .typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="header">
    Sentient AI
</div>

<div class="chat-container" id="chat-box"></div>

<div class="input-container">
    <input type="text" id="user-input" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("user-input");

    function appendMessage(text, className, isTyping=false) {
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message", className);
        if (isTyping) messageDiv.classList.add("typing");

        messageDiv.innerText = text;

        const ts = document.createElement("span");
        ts.classList.add("timestamp");
        ts.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        messageDiv.appendChild(ts);

        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        return messageDiv;
    }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        appendMessage(message, "user");
        input.value = "";

        // Optional: memory command
        const useMemory = message.toLowerCase().startsWith("remember:") ? true : false;

        // Typing placeholder
        const botDiv = appendMessage("...", "bot", true);

        try {
            const response = await fetch("/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify({ message: message, memory: useMemory })
            });

            const data = await response.json();
            botDiv.innerText = data.response;
            botDiv.classList.remove("typing");

            // Append timestamp
            const ts = document.createElement("span");
            ts.classList.add("timestamp");
            ts.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            botDiv.appendChild(ts);

        } catch (error) {
            botDiv.innerText = "Error connecting to Sentient.";
            botDiv.classList.remove("typing");
        }
    }

    // ENTER key support
    input.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

</body>
</html>
